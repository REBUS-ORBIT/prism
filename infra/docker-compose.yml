# PRISM Server stack — runs on VM 211.
#
# Three services:
#   prism-server   the Fastify + WS orchestrator (built from server/ + web/)
#   postgres       jobs, settings, keys, workstations, presets
#   redis          BullMQ queue + transient log fan-out
#
# Phase 8 will switch `prism-server.image` to ghcr.io/rebus-orbit/prism-server:latest
# and remove the `build:` directive so deploys are pull-only.

services:
  prism-server:
    # Production: pull from GHCR (built by .github/workflows/server.yml).
    # Local dev: comment `image:` and uncomment `build:` to build from source.
    image: ghcr.io/rebus-orbit/prism-server:${PRISM_IMAGE_TAG:-latest}
    # build:
    #   context: ..
    #   dockerfile: server/Dockerfile
    container_name: prism-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8765:8765"
    environment:
      NODE_ENV: production
      PORT: 8765
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-https://prism.rebus.industries}"
      POSTGRES_URL: "postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-prism}"
      REDIS_URL: "redis://redis:6379"
      ORBIT_SERVER_URL: "${ORBIT_SERVER_URL}"
      ORBIT_DEV_SERVER_URL: "${ORBIT_DEV_SERVER_URL:-}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      SESSION_SECRET: "${SESSION_SECRET}"
      UPLOAD_DIR: "/var/lib/prism/uploads"
      # Pre-conversion sidecar: empty disables the feature, keeping the
      # legacy "everything to Rhino" routing.  Setting this to the
      # in-network URL of prism-assimp turns on Assimp pre-convert for
      # extensions in ASSIMP_EXTS.
      ASSIMP_SERVICE_URL: "${ASSIMP_SERVICE_URL:-http://prism-assimp:8088}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - prism-uploads:/var/lib/prism/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:16.9-alpine
    container_name: prism-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-prism}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-prism}"
    volumes:
      - prism-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prism} -d ${POSTGRES_DB:-prism}"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: valkey/valkey:8-alpine
    container_name: prism-redis
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1000", "--appendonly", "yes"]
    volumes:
      - prism-redis-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prism-assimp:
    # Pre-conversion sidecar: takes Assimp-readable formats (.gltf, .glb,
    # .stl, .ply, .dae, .blend, .x, .usdz) and returns an OBJ+MTL+textures
    # zip that the agent's Rhino pipeline already knows how to ingest.
    # Built by .github/workflows/assimp.yml; pin in prod via
    # PRISM_ASSIMP_TAG.  Listening on :8088 in-network only.
    image: ghcr.io/rebus-orbit/prism-assimp:${PRISM_ASSIMP_TAG:-latest}
    container_name: prism-assimp
    restart: unless-stopped
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      ASSIMP_WORK_ROOT: /work
      PYTHONUNBUFFERED: "1"
    volumes:
      - prism-assimp-work:/work
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prism-postgres-data:
  prism-redis-data:
  prism-uploads:
  prism-assimp-work:
