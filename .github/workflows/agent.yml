name: agent-msi

# Builds the PRISM.Agent .NET 8 Windows multi-file self-contained x64
# publish (folder of DLLs + native deps + PRISM.Agent.exe thunk) so
# that individual DLLs can be hot-swapped on a workstation without
# going through a full release cycle (see tools/hotpatch-pc02.ps1).
# On tag push, packages the publish folder as a zip and attaches it
# to a GH Release.  When CODE_SIGN_CERT/CODE_SIGN_PASSWORD are set,
# the PRISM.Agent.exe thunk is signed before zipping.
#
# Non-tag pushes still build + upload an unsigned artifact for manual
# install testing.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'agent/**'
      - 'shared/contracts/**'
      - 'vendor/orbit-monorepo/**'
      - '.github/workflows/agent.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    # Agent build pulls vendor/orbit-monorepo (private). Until a deploy key
    # is provisioned, this job only runs successfully when the submodule
    # checkout succeeds. Triggered manually for now.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ORBIT_DEPLOY_PAT }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Block McNeel WIP feed (diagnose then clear)
        shell: pwsh
        run: |
          Write-Host "--- Configured NuGet sources before restore ---"
          dotnet nuget list source
          # Remove known McNeel WIP feed entries that may be registered on the runner.
          # Our agent/NuGet.Config already uses <clear/>, but env-var injected sources
          # or machine-level configs can still override.  Belt-and-suspenders.
          $wipNames = @("McNeel Build Server","McNeel","rhino","rhinocommon","mcneel")
          foreach ($name in $wipNames) {
            dotnet nuget remove source $name 2>$null; $true
          }
          Write-Host "--- Configured NuGet sources after clear ---"
          dotnet nuget list source

      - name: Restore
        working-directory: agent
        # --source overrides ALL configured sources for this restore, ensuring only
        # nuget.org is consulted even if the runner has a WIP feed registered globally.
        run: dotnet restore PRISM.Agent.sln --source https://api.nuget.org/v3/index.json

      - name: Publish (self-contained, multi-file, win-x64)
        working-directory: agent
        # Multi-file layout intentionally — keeps individual DLLs swappable on a
        # running workstation (see tools/hotpatch-pc02.ps1).  PublishSingleFile
        # is also pinned to false in the csproj; the CLI flag here is belt-and-
        # suspenders against any inherited MSBuild default.
        run: |
          dotnet publish src/PRISM.Agent/PRISM.Agent.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=true `
            -o publish

      - name: Stage installer payload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path stage | Out-Null
          Copy-Item agent/publish/* stage/ -Recurse -Force
          Copy-Item agent/install/install.ps1   stage/ -Force -ErrorAction SilentlyContinue
          Copy-Item agent/install/uninstall.ps1 stage/ -Force -ErrorAction SilentlyContinue

      - name: Sign binaries (if cert provided)
        if: env.CODE_SIGN_CERT != '' && env.CODE_SIGN_PASSWORD != ''
        env:
          CODE_SIGN_CERT:     ${{ secrets.CODE_SIGN_CERT }}
          CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
        shell: pwsh
        run: |
          $bytes = [System.Convert]::FromBase64String($env:CODE_SIGN_CERT)
          [IO.File]::WriteAllBytes("cert.pfx", $bytes)
          $exe = Get-ChildItem stage -Filter PRISM.Agent.exe -Recurse | Select-Object -First 1
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign `
            /f cert.pfx /p $env:CODE_SIGN_PASSWORD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            $exe.FullName

      - name: Zip publish dir
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "${{ github.sha }}".Substring(0, 7) }
          Compress-Archive -Path stage/* -DestinationPath "PRISM.Agent-$tag.zip" -Force

      - name: Build wizard installer (Inno Setup)
        shell: pwsh
        # Inno Setup ships pre-installed on windows-latest at the path below.
        # The .iss script consumes /DPayloadDir + /DAgentVersion compile-time
        # defines and emits PRISM.Agent-Setup-v<ver>.exe alongside the iss.
        run: |
          $tag     = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "${{ github.sha }}".Substring(0, 7) }
          $version = $tag -replace '^v', ''
          $payload = (Resolve-Path stage).Path

          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }

          & $iscc `
            "/DPayloadDir=$payload" `
            "/DAgentVersion=$version" `
            "/Q" `
            "agent\install\PRISM.Agent.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

          # The .iss writes its output to OutputDir=. (relative to the .iss).
          # Move it next to the zip so the upload glob picks both up together.
          Move-Item -Force "agent\install\PRISM.Agent-Setup-v$version.exe" .

          Write-Host "Built artifacts:"
          Get-ChildItem PRISM.Agent-*.zip, PRISM.Agent-Setup-*.exe | Format-Table Name,Length

      - name: Sign installer (if cert provided)
        if: env.CODE_SIGN_CERT != '' && env.CODE_SIGN_PASSWORD != ''
        env:
          CODE_SIGN_CERT:     ${{ secrets.CODE_SIGN_CERT }}
          CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
        shell: pwsh
        run: |
          if (-not (Test-Path "cert.pfx")) {
            $bytes = [System.Convert]::FromBase64String($env:CODE_SIGN_CERT)
            [IO.File]::WriteAllBytes("cert.pfx", $bytes)
          }
          $setup = Get-ChildItem PRISM.Agent-Setup-*.exe | Select-Object -First 1
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign `
            /f cert.pfx /p $env:CODE_SIGN_PASSWORD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            $setup.FullName

      - uses: actions/upload-artifact@v4
        with:
          name: prism-agent
          path: |
            PRISM.Agent-*.zip
            PRISM.Agent-Setup-*.exe
          if-no-files-found: error

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        id: notes
        shell: bash
        # Pulls the section for the current tag out of CHANGELOG.md so the
        # GitHub Release body is the human-readable changelog instead of
        # empty / auto-generated text. Convention (see top of CHANGELOG.md):
        #
        #     ## vX.Y.Z — Optional title
        #     - bullet
        #     - bullet
        #
        # Extracts everything between `## vX.Y.Z` (with or without trailing
        # title text) and the next `## v` heading. On workflow_dispatch with
        # no tag we fall back to a generic body.
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG=""
          fi
          if [[ -n "$TAG" && -f CHANGELOG.md ]]; then
            awk -v tag="$TAG" '
              $0 ~ "^## " tag " " || $0 == "## " tag { found=1; next }
              found && /^## v/ { exit }
              found { print }
            ' CHANGELOG.md > RELEASE_NOTES.md
            if [[ ! -s RELEASE_NOTES.md ]]; then
              {
                echo "No CHANGELOG entry found for $TAG; using a default body."
                echo ""
                echo "See [CHANGELOG.md](https://github.com/REBUS-ORBIT/prism/blob/main/CHANGELOG.md) for full history."
              } > RELEASE_NOTES.md
            fi
          elif [[ -f CHANGELOG.md ]]; then
            {
              echo "Manual / non-tag build of PRISM Agent."
              echo ""
              echo "See [CHANGELOG.md](https://github.com/REBUS-ORBIT/prism/blob/main/CHANGELOG.md) for full history."
            } > RELEASE_NOTES.md
          else
            echo "No CHANGELOG.md present in repo." > RELEASE_NOTES.md
          fi
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md
          echo "----- end -----"

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        id: release
        uses: softprops/action-gh-release@v2
        with:
          repository: REBUS-ORBIT/prism-agent
          tag_name: ${{ github.ref_name || 'latest' }}
          name: PRISM Agent ${{ github.ref_name || 'latest' }}
          body_path: RELEASE_NOTES.md
          token: ${{ secrets.ORBIT_DEPLOY_PAT }}
          # Order matters: the .zip is listed FIRST so it lands as
          # release.assets[0], which is what the in-app Updater (pre-v0.1.30)
          # blindly downloads.  The setup .exe is added as a sibling asset
          # for fresh installs.  v0.1.30+ Updater explicitly prefers the
          # .zip by filename so ordering becomes irrelevant after rollout.
          files: |
            PRISM.Agent-*.zip
            PRISM.Agent-Setup-*.exe
          make_latest: true

      - name: Update PRISM server settings (version + download URL)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        # Non-fatal: the runner is on the public internet and cannot reach the
        # internal VM IP. The PRISM server falls back to GitHub Releases API for
        # the agent version automatically.
        continue-on-error: true
        shell: pwsh
        env:
          PROD_VM_SSH_KEY: ${{ secrets.PROD_VM_SSH_KEY }}
          PROD_VM_HOST:    ${{ secrets.PROD_VM_HOST }}
          PROD_VM_USER:    ${{ secrets.PROD_VM_USER }}
        run: |
          if (-not $env:PROD_VM_SSH_KEY) { Write-Host "PROD_VM_SSH_KEY not set; skipping DB update"; exit 0 }
          $tag = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "latest" }
          $zipName = "PRISM.Agent-$tag.zip"
          $downloadUrl = "https://github.com/REBUS-ORBIT/prism-agent/releases/download/$tag/$zipName"

          $keyPath = "$env:RUNNER_TEMP\prod_vm_key"
          [IO.File]::WriteAllText($keyPath, $env:PROD_VM_SSH_KEY)
          icacls $keyPath /inheritance:r /grant:r "${env:USERNAME}:R" | Out-Null

          $sqlFile = "$env:RUNNER_TEMP\update_settings.sql"
          $sqlContent = "INSERT INTO settings (key, value) VALUES ('workstation_agent_version', '$tag'), ('workstation_agent_download_url', '$downloadUrl') ON CONFLICT (key) DO UPDATE SET value = EXCLUDED.value, updated_at = NOW();"
          [IO.File]::WriteAllText($sqlFile, $sqlContent)

          scp -i $keyPath -o StrictHostKeyChecking=no -o ConnectTimeout=15 $sqlFile "${env:PROD_VM_USER}@${env:PROD_VM_HOST}:/tmp/update_settings.sql"
          ssh -i $keyPath -o StrictHostKeyChecking=no -o ConnectTimeout=15 "${env:PROD_VM_USER}@${env:PROD_VM_HOST}" "docker cp /tmp/update_settings.sql prism-postgres:/tmp/update_settings.sql && docker exec prism-postgres psql -U prism -d prism -f /tmp/update_settings.sql"
          Write-Host "Updated PRISM settings: version=$tag url=$downloadUrl"
