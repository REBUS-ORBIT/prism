name: agent-msi

# Builds the PRISM.Agent .NET 8 Windows service into a single-file
# self-contained x64 publish, packages it as an MSI via WiX (when
# CODE_SIGN_CERT/CODE_SIGN_PASSWORD secrets are set, signs both the
# .exe and the .msi), and attaches the artifact to a GH Release on
# tag push.
#
# Non-tag pushes still build + upload an unsigned artifact for manual
# install testing.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'agent/**'
      - 'shared/contracts/**'
      - 'vendor/orbit-monorepo/**'
      - '.github/workflows/agent.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    # Agent build pulls vendor/orbit-monorepo (private). Until a deploy key
    # is provisioned, this job only runs successfully when the submodule
    # checkout succeeds. Triggered manually for now.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ORBIT_DEPLOY_PAT }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Block McNeel WIP feed (diagnose then clear)
        shell: pwsh
        run: |
          Write-Host "--- Configured NuGet sources before restore ---"
          dotnet nuget list source
          # Remove known McNeel WIP feed entries that may be registered on the runner.
          # Our agent/NuGet.Config already uses <clear/>, but env-var injected sources
          # or machine-level configs can still override.  Belt-and-suspenders.
          $wipNames = @("McNeel Build Server","McNeel","rhino","rhinocommon","mcneel")
          foreach ($name in $wipNames) {
            dotnet nuget remove source $name 2>$null; $true
          }
          Write-Host "--- Configured NuGet sources after clear ---"
          dotnet nuget list source

      - name: Restore
        working-directory: agent
        # --source overrides ALL configured sources for this restore, ensuring only
        # nuget.org is consulted even if the runner has a WIP feed registered globally.
        run: dotnet restore PRISM.Agent.sln --source https://api.nuget.org/v3/index.json

      - name: Publish (self-contained, single-file, win-x64)
        working-directory: agent
        run: |
          dotnet publish src/PRISM.Agent/PRISM.Agent.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            -o publish

      - name: Stage installer payload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path stage | Out-Null
          Copy-Item agent/publish/* stage/ -Recurse -Force
          Copy-Item agent/install/install.ps1   stage/ -Force -ErrorAction SilentlyContinue
          Copy-Item agent/install/uninstall.ps1 stage/ -Force -ErrorAction SilentlyContinue

      - name: Sign binaries (if cert provided)
        if: env.CODE_SIGN_CERT != '' && env.CODE_SIGN_PASSWORD != ''
        env:
          CODE_SIGN_CERT:     ${{ secrets.CODE_SIGN_CERT }}
          CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
        shell: pwsh
        run: |
          $bytes = [System.Convert]::FromBase64String($env:CODE_SIGN_CERT)
          [IO.File]::WriteAllBytes("cert.pfx", $bytes)
          $exe = Get-ChildItem stage -Filter PRISM.Agent.exe -Recurse | Select-Object -First 1
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign `
            /f cert.pfx /p $env:CODE_SIGN_PASSWORD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            $exe.FullName

      - name: Zip publish dir
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "${{ github.sha }}".Substring(0, 7) }
          Compress-Archive -Path stage/* -DestinationPath "PRISM.Agent-$tag.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: prism-agent
          path: PRISM.Agent-*.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        id: release
        uses: softprops/action-gh-release@v2
        with:
          repository: REBUS-ORBIT/prism-agent
          tag_name: ${{ github.ref_name || 'latest' }}
          name: PRISM Agent ${{ github.ref_name || 'latest' }}
          token: ${{ secrets.ORBIT_DEPLOY_PAT }}
          files: PRISM.Agent-*.zip
          make_latest: true

      - name: Update PRISM server settings (version + download URL)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        # Non-fatal: the runner is on the public internet and cannot reach the
        # internal VM IP. The PRISM server falls back to GitHub Releases API for
        # the agent version automatically.
        continue-on-error: true
        shell: pwsh
        env:
          PROD_VM_SSH_KEY: ${{ secrets.PROD_VM_SSH_KEY }}
          PROD_VM_HOST:    ${{ secrets.PROD_VM_HOST }}
          PROD_VM_USER:    ${{ secrets.PROD_VM_USER }}
        run: |
          if (-not $env:PROD_VM_SSH_KEY) { Write-Host "PROD_VM_SSH_KEY not set; skipping DB update"; exit 0 }
          $tag = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "latest" }
          $zipName = "PRISM.Agent-$tag.zip"
          $downloadUrl = "https://github.com/REBUS-ORBIT/prism-agent/releases/download/$tag/$zipName"

          $keyPath = "$env:RUNNER_TEMP\prod_vm_key"
          [IO.File]::WriteAllText($keyPath, $env:PROD_VM_SSH_KEY)
          icacls $keyPath /inheritance:r /grant:r "${env:USERNAME}:R" | Out-Null

          $sqlFile = "$env:RUNNER_TEMP\update_settings.sql"
          $sqlContent = "INSERT INTO settings (key, value) VALUES ('workstation_agent_version', '$tag'), ('workstation_agent_download_url', '$downloadUrl') ON CONFLICT (key) DO UPDATE SET value = EXCLUDED.value, updated_at = NOW();"
          [IO.File]::WriteAllText($sqlFile, $sqlContent)

          scp -i $keyPath -o StrictHostKeyChecking=no -o ConnectTimeout=15 $sqlFile "${env:PROD_VM_USER}@${env:PROD_VM_HOST}:/tmp/update_settings.sql"
          ssh -i $keyPath -o StrictHostKeyChecking=no -o ConnectTimeout=15 "${env:PROD_VM_USER}@${env:PROD_VM_HOST}" "docker cp /tmp/update_settings.sql prism-postgres:/tmp/update_settings.sql && docker exec prism-postgres psql -U prism -d prism -f /tmp/update_settings.sql"
          Write-Host "Updated PRISM settings: version=$tag url=$downloadUrl"
