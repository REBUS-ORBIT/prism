name: server-image

# Builds + pushes the PRISM server container to GHCR.
#
# Image:      ghcr.io/rebus-orbit/prism-server
# Tags:       latest (on main), <branch>, <short-sha>, <tag-name> (on tag push)
# Caching:    GHA-native layer cache so subsequent pushes are fast
#
# Permissions: requires `packages: write` to push to GHCR; the
# `contents: read` is for checkout.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'server/**'
      - 'web/**'
      - 'shared/**'
      # Agent install scripts + the example config are baked into the
      # server image (served by /api/admin/workstations/downloads/*) so
      # rebuild when they change too.
      - 'agent/install/**'
      - 'agent/src/PRISM.Agent/agent-config.example.json'
      - '.github/workflows/server.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # No submodule fetch: the server image only needs server/ + web/ + shared/.
      # The agent (which needs vendor/orbit-monorepo) is built by agent.yml.
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rebus-orbit/prism-server
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' }}
          cache-from: ${{ github.event_name == 'workflow_dispatch' && '' || 'type=gha' }}
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    # Runs on the LAN-local self-hosted runner (LXC 261, 10.0.200.61) so the
    # SSH hop to VM 211 stays inside VLAN 200.  The runner has its own ed25519
    # deploy key (~runner/.ssh/prism_deploy_ed25519) authorized on
    # ~rebus/.ssh/authorized_keys on VM 211, plus an ~runner/.ssh/config alias
    # `prism-prod` -> rebus@10.0.200.211 with the right IdentityFile, so we no
    # longer depend on the PROD_VM_HOST / PROD_VM_USER / PROD_VM_SSH_KEY
    # secrets for this step.
    runs-on: [self-hosted, prism-deploy]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      # Need the workspace so we can sync infra/docker-compose.yml.  /opt/prism
      # on VM 211 is not a git checkout, so the file has to be scp'd whenever
      # it changes (e.g. service additions, env tweaks).
      - uses: actions/checkout@v4

      - name: Sync compose + restart prism-server on VM 211
        run: |
          scp -o BatchMode=yes -o ConnectTimeout=10 \
            infra/docker-compose.yml \
            prism-prod:/opt/prism/docker-compose.yml
          ssh -o BatchMode=yes -o ConnectTimeout=10 prism-prod <<'REMOTE'
            set -euo pipefail
            cd /opt/prism
            docker compose pull prism-server
            docker compose up -d prism-server
            docker compose ps prism-server
          REMOTE
