name: server-image

# Builds + pushes the PRISM server container to GHCR.
#
# Image:      ghcr.io/rebus-orbit/prism-server
# Tags:       latest (on main), <branch>, <short-sha>, <tag-name> (on tag push)
# Caching:    GHA-native layer cache so subsequent pushes are fast
#
# Permissions: requires `packages: write` to push to GHCR; the
# `contents: read` is for checkout.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'server/**'
      - 'web/**'
      - 'shared/**'
      - '.github/workflows/server.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # No submodule fetch: the server image only needs server/ + web/ + shared/.
      # The agent (which needs vendor/orbit-monorepo) is built by agent.yml.
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rebus-orbit/prism-server
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
